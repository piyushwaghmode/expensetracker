{% extends "base.html" %}

{% block title %}Add Expense - Expense Tracker{% endblock %}

{% block content %}
<div class="add-expense-container">
    <h1>Add New Expense</h1>
    <p class="subtitle">Track your spending</p>
    
    <form method="POST" action="{{ url_for('add_expense') }}" class="expense-form">
        <div class="form-group">
            <label for="amount">Amount ($) <span class="required">*</span></label>
            <input type="number" id="amount" name="amount" step="0.01" required placeholder="Enter amount (e.g., 25.50)">
        </div>
        
        <div class="form-group">
            <label for="category">Category <span class="required">*</span></label>
            <select id="category" name="category" required>
                <option value="">-- Select Category --</option>
                <option value="Food">🍔 Food & Dining</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Entertainment">🎬 Entertainment</option>
                <option value="Utilities">💡 Utilities</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Health">🏥 Health</option>
                <option value="Education">📚 Education</option>
                <option value="Other">📌 Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="What did you spend on? (optional)" rows="3"></textarea>
        </div>
        
        <div class="form-group">
            <label for="date">Date <span class="required">*</span></label>
            <input type="date" id="date" name="date" required>
        </div>
        
        <div class="button-group">
            <button type="submit" class="btn btn-primary">Add Expense</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    // Set today's date as default
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
